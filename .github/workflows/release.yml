name: Release

on:
  push:
    branches:
      - main

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.check.outputs.release }}
      version: ${{ steps.check.outputs.version }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect version bump
        id: check
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          git show HEAD~1:package.json > /tmp/prev-package.json
          PREVIOUS=$(node -p "require('/tmp/prev-package.json').version")
          echo "current=$CURRENT previous=$PREVIOUS"
          if [ "$CURRENT" = "$PREVIOUS" ]; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git ls-remote --tags origin "refs/tags/v$CURRENT" | grep -q .; then
            echo "::error::Tag v$CURRENT already exists on origin"
            exit 1
          fi
          echo "release=true" >> "$GITHUB_OUTPUT"
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "tag=v$CURRENT" >> "$GITHUB_OUTPUT"

  publish:
    needs: detect
    if: needs.detect.outputs.release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for Trusted Publishers (OIDC)
        run: npm install -g npm@latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Verify CHANGELOG has entry for this version
        run: |
          PKG="${{ needs.detect.outputs.version }}"
          if ! grep -q "^## \[$PKG\]" CHANGELOG.md; then
            echo "::error::No '## [$PKG]' section in CHANGELOG.md"
            exit 1
          fi

      - name: Build
        run: |
          bun run clean
          bun run lint
          bun run type-check
          bun test
          bun run build

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public

      - name: Tag release
        env:
          TAG: ${{ needs.detect.outputs.tag }}
        run: |
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.detect.outputs.tag }}
          generate_release_notes: true

  notify:
    needs: [detect, publish]
    if: always() && needs.detect.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_PRODUCTION }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ needs.publish.result == 'success' && '✅' || '❌' }} *@deyta-ai/sdk* ${{ needs.publish.result == 'success' && 'published' || 'failed to publish' }} *${{ needs.detect.outputs.tag }}*"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Version:*\n`${{ needs.detect.outputs.version }}`" },
                    { "type": "mrkdwn", "text": "*Actor:*\n${{ github.actor }}" }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "View Run" },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    },
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "View on npm" },
                      "url": "https://www.npmjs.com/package/@deyta-ai/sdk/v/${{ needs.detect.outputs.version }}"
                    }
                  ]
                }
              ]
            }
